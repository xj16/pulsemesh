# PulseMesh full-stack local environment.
#
#   command-query (Clojure)  HTTP :8080   -> event store + read models + publish
#   fabric        (Erlang)   WS   :8090   -> persistent connections + fan-out
#   postgres      :5432   event store (source of truth)
#   redis         :6379   read-model cache
#   rabbitmq      :5672 / mgmt :15672   event bus between the two services
#
# Bring it up:  docker compose up --build
# Then:         see docs/API.md for the command/query/websocket walkthrough.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pulsemesh
      POSTGRES_PASSWORD: pulsemesh
      POSTGRES_DB: pulsemesh
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsemesh"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # management UI (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  command-query:
    build:
      context: ./clojure-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      PULSEMESH_HTTP_PORT: "8080"
      PULSEMESH_PG_URL: "jdbc:postgresql://postgres:5432/pulsemesh?user=pulsemesh&password=pulsemesh"
      PULSEMESH_REDIS_URI: "redis://redis:6379"
      PULSEMESH_AMQP_URI: "amqp://guest:guest@rabbitmq:5672"
      PULSEMESH_AMQP_EXCHANGE: "pulsemesh.events"
    ports:
      - "8080:8080"

  fabric:
    build:
      context: ./erlang-fabric
    depends_on:
      rabbitmq:
        condition: service_healthy
      command-query:
        condition: service_started
    environment:
      PULSEMESH_FABRIC_PORT: "8090"
      PULSEMESH_AMQP_URI: "amqp://guest:guest@rabbitmq:5672"
      PULSEMESH_AMQP_EXCHANGE: "pulsemesh.events"
      PULSEMESH_AMQP_QUEUE: "pulsemesh.fabric"
      # Log-replay endpoint used to rehydrate presence trackers on (re)start.
      PULSEMESH_CQ_URL: "http://command-query:8080"
    ports:
      - "8090:8090"

  # Demo seeder: only runs under the `demo` profile. It waits for the
  # command/query service, populates a few channels with realistic presence +
  # chat, then exits — so `docker compose --profile demo up` brings the stack
  # up ALREADY populated and the dashboard at :8090 shows a live room at once.
  #   docker compose --profile demo up --build
  seed:
    profiles: ["demo"]
    image: curlimages/curl:8.11.0
    depends_on:
      command-query:
        condition: service_started
    environment:
      PULSEMESH_CQ_URL: "http://command-query:8080"
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["sh", "/scripts/seed.sh"]
    restart: "no"

  # Prometheus for the `observability` profile. Scrapes the command/query
  # service's /metrics endpoint (commands accepted/rejected/invalid, conflict
  # retries, append latency).
  #   docker compose --profile observability up
  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.55.1
    depends_on:
      command-query:
        condition: service_started
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

volumes:
  pg-data:
