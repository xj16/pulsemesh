name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Clojure command/query service: run the pure-domain tests and build the
  # uberjar. Real Postgres/Redis/Rabbit are provided as service containers so
  # the boot path is exercised too.
  # ---------------------------------------------------------------------------
  clojure:
    name: Clojure service (test + uberjar)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pulsemesh
          POSTGRES_PASSWORD: pulsemesh
          POSTGRES_DB: pulsemesh
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pulsemesh"
          --health-interval 5s --health-timeout 3s --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 20
      rabbitmq:
        image: rabbitmq:3.13-alpine
        ports: ["5672:5672"]
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s --health-timeout 5s --health-retries 20

    defaults:
      run:
        working-directory: clojure-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.5
        with:
          cli: latest

      - name: Cache Maven / deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: deps-${{ hashFiles('clojure-service/deps.edn') }}
          restore-keys: deps-

      - name: Run pure-domain + property tests
        run: clojure -X:test

      - name: Run integration tests (real Postgres + Redis)
        env:
          PULSEMESH_PG_URL: "jdbc:postgresql://localhost:5432/pulsemesh?user=pulsemesh&password=pulsemesh"
          PULSEMESH_REDIS_URI: "redis://localhost:6379"
        run: clojure -X:integration

      - name: Coverage report (cloverage)
        run: clojure -M:coverage || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: clojure-service/target/coverage/codecov.json
          flags: clojure
          fail_ci_if_error: false
        continue-on-error: true

      - name: Build uberjar
        run: clojure -T:build uber

      - name: Smoke-boot against real infra
        env:
          PULSEMESH_PG_URL: "jdbc:postgresql://localhost:5432/pulsemesh?user=pulsemesh&password=pulsemesh"
          PULSEMESH_REDIS_URI: "redis://localhost:6379"
          PULSEMESH_AMQP_URI: "amqp://guest:guest@localhost:5672"
        run: |
          java -jar target/pulsemesh.jar &
          APP_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health; then echo "healthy"; break; fi
            sleep 2
          done
          echo
          # Exercise a real command -> event flow end to end.
          curl -sf -X POST http://localhost:8080/api/commands \
            -H 'content-type: application/json' \
            -d '{"type":"join-channel","channel-id":"ci","user-id":"alice"}' | tee /tmp/join.json
          echo
          curl -sf -X POST http://localhost:8080/api/commands \
            -H 'content-type: application/json' \
            -d '{"type":"post-message","channel-id":"ci","user-id":"alice","body":"hi from CI"}'
          echo
          curl -sf http://localhost:8080/api/channels/ci/presence
          echo
          curl -sf http://localhost:8080/api/channels/ci/messages
          echo
          kill $APP_PID || true

  # ---------------------------------------------------------------------------
  # Erlang/OTP fabric: compile with warnings-as-errors and run EUnit.
  # ---------------------------------------------------------------------------
  erlang:
    name: Erlang fabric (compile + eunit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: erlang-fabric

    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang/OTP + rebar3
        uses: erlef/setup-beam@v1
        with:
          otp-version: "26"
          rebar3-version: "3.24.0"

      - name: Cache rebar3
        uses: actions/cache@v4
        with:
          path: |
            erlang-fabric/_build
            ~/.cache/rebar3
          key: rebar3-${{ hashFiles('erlang-fabric/rebar.config') }}
          restore-keys: rebar3-

      - name: Compile (warnings as errors)
        run: rebar3 compile

      - name: Run EUnit tests
        run: rebar3 eunit

      - name: Build production release
        run: rebar3 as prod release

  # ---------------------------------------------------------------------------
  # Standalone static demo bundle: build the self-contained dashboard and
  # publish it as a downloadable artifact. It runs in demo mode with no
  # backend, so it is directly embeddable in a portfolio / on Pages.
  # ---------------------------------------------------------------------------
  web-demo:
    name: Static demo bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build static bundle
        run: bash scripts/build-web.sh
      - name: Sanity-check the bundle
        run: |
          test -f web/dist/index.html
          grep -q 'PulseMesh' web/dist/index.html
      - name: Upload demo bundle
        uses: actions/upload-artifact@v4
        with:
          name: pulsemesh-dashboard
          path: web/dist

  # ---------------------------------------------------------------------------
  # Full-stack docker-compose smoke test: build both images and confirm both
  # services report healthy, wired to real Postgres/Redis/RabbitMQ.
  # ---------------------------------------------------------------------------
  compose-smoke:
    name: docker-compose smoke test
    runs-on: ubuntu-latest
    needs: [clojure, erlang]
    steps:
      - uses: actions/checkout@v4

      - name: Build and start the stack
        run: docker compose up --build -d

      - name: Wait for services to become healthy
        run: |
          set -e
          ok=0
          for i in $(seq 1 40); do
            cq=$(curl -sf http://localhost:8080/health || true)
            fb=$(curl -sf http://localhost:8090/healthz || true)
            if [ -n "$cq" ] && [ -n "$fb" ]; then
              echo "command-query: $cq"
              echo "fabric: $fb"
              ok=1; break
            fi
            sleep 5
          done
          if [ "$ok" -ne 1 ]; then
            echo "services did not become healthy"; docker compose logs; exit 1
          fi

      - name: End-to-end command flow
        run: |
          curl -sf -X POST http://localhost:8080/api/commands \
            -H 'content-type: application/json' \
            -d '{"type":"join-channel","channel-id":"smoke","user-id":"bob"}'
          echo
          curl -sf http://localhost:8080/api/channels/smoke/presence
          echo

      - name: Replay endpoint returns the stream
        run: |
          curl -sf "http://localhost:8080/api/channels/smoke/events?since=0" \
            | grep -q '"member-joined"'

      - name: Prometheus metrics are exposed
        run: |
          curl -sf http://localhost:8080/metrics \
            | grep -q 'pulsemesh_commands_accepted_total'

      - name: Fabric serves the live dashboard
        run: |
          curl -sf http://localhost:8090/ | grep -q 'PulseMesh'

      - name: Tear down
        if: always()
        run: docker compose down -v
